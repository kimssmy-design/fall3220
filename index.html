<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문장 읽기 연습</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      background: #f4f6f8;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    #app {
      width: 100%;
      max-width: 580px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 13px;
      color: #888;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      gap: 12px;
    }
    .stage-label {
      font-size: 13px;
      color: #888;
      min-width: 40px;
      white-space: nowrap;
    }
    .progress-wrap {
      flex: 1;
      height: 8px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: #1D9E75;
      transition: width 0.5s ease;
    }
    .score-badge {
      font-size: 13px;
      font-weight: 600;
      color: #1D9E75;
      min-width: 36px;
      text-align: right;
    }

    /* Sentence card */
    .sentence-card {
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      margin-bottom: 1rem;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .sentence-text {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a2e;
      line-height: 1.7;
      letter-spacing: 0.01em;
      transition: color 0.3s;
    }
    .sentence-text.correct { color: #0F6E56; }
    .sentence-text.wrong   { color: #A32D2D; }
    .underline-word {
      text-decoration: underline;
      text-underline-offset: 5px;
      text-decoration-color: #378ADD;
    }

    .speak-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f0faf6;
      border: 1px solid #9FE1CB;
      border-radius: 99px;
      padding: 6px 16px;
      font-size: 13px;
      color: #0F6E56;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }
    .speak-btn:hover { background: #d4f0e5; }
    .speak-btn svg { width: 14px; height: 14px; fill: #0F6E56; flex-shrink: 0; }

    /* Question label */
    .question-label {
      font-size: 14px;
      color: #555;
      text-align: center;
      margin-bottom: 0.75rem;
    }

    /* Hint */
    .hint-wrap {
      text-align: center;
      margin-bottom: 0.75rem;
    }
    .hint-toggle {
      font-size: 13px;
      color: #aaa;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      background: none;
      border: none;
      font-family: inherit;
    }
    .hint-toggle:hover { color: #777; }
    .hint-box {
      display: none;
      margin-top: 8px;
      background: #fffbe6;
      border: 1px solid #fac775;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: #633806;
      text-align: center;
    }
    .hint-box.show { display: block; }

    /* Choices */
    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1rem;
    }
    .choice-btn {
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px 10px;
      font-size: 15px;
      font-weight: 500;
      color: #1a1a2e;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
      line-height: 1.4;
      font-family: inherit;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .choice-btn:hover:not(:disabled) {
      background: #f0faf6;
      border-color: #9FE1CB;
      transform: translateY(-1px);
    }
    .choice-btn.correct-ans {
      background: #E1F5EE;
      border-color: #1D9E75;
      color: #085041;
    }
    .choice-btn.wrong-ans {
      background: #FCEBEB;
      border-color: #E24B4A;
      color: #501313;
    }
    .choice-btn:disabled { cursor: default; transform: none; }

    /* Feedback */
    .feedback {
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      min-height: 22px;
      margin-bottom: 0.75rem;
      color: transparent;
      transition: color 0.2s;
    }
    .feedback.correct { color: #0F6E56; }
    .feedback.wrong   { color: #A32D2D; }

    /* Next button */
    .next-btn {
      display: none;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #1D9E75;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
      box-shadow: 0 3px 10px rgba(29,158,117,0.3);
    }
    .next-btn:hover  { background: #0F6E56; }
    .next-btn:active { transform: scale(0.98); }

    /* Result screen */
    .result-screen {
      display: none;
      text-align: center;
      padding: 2.5rem 1rem;
      background: #fff;
      border-radius: 20px;
      border: 1.5px solid #e2e8f0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    }
    .result-screen.show { display: block; }
    .result-icon {
      font-size: 56px;
      margin-bottom: 12px;
      display: block;
    }
    .result-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    .result-sub {
      font-size: 15px;
      color: #666;
      margin-bottom: 8px;
    }
    .result-score {
      font-size: 32px;
      font-weight: 700;
      color: #1D9E75;
      margin-bottom: 1.5rem;
    }
    .restart-btn {
      padding: 12px 32px;
      border-radius: 12px;
      border: 1.5px solid #e2e8f0;
      background: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: #1a1a2e;
      font-family: inherit;
      transition: background 0.2s;
    }
    .restart-btn:hover { background: #f4f6f8; }

    /* Confetti */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    @media (max-width: 400px) {
      .sentence-text { font-size: 18px; }
      .choice-btn    { font-size: 14px; padding: 12px 8px; }
    }
  </style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="app">
  <div class="header">
    <h1>문장 읽기 연습</h1>
    <p>문장을 읽고 알맞은 답을 고르세요</p>
  </div>

  <div id="quiz-screen">
    <div class="top-bar">
      <span class="stage-label" id="stage-lbl">1 / 8</span>
      <div class="progress-wrap">
        <div class="progress-fill" id="prog" style="width:0%"></div>
      </div>
      <span class="score-badge" id="score-lbl">0점</span>
    </div>

    <div class="sentence-card">
      <div class="sentence-text" id="sentence-text"></div>
      <button class="speak-btn" onclick="speakSentence()">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        소리 듣기
      </button>
    </div>

    <div class="hint-wrap">
      <button class="hint-toggle" onclick="toggleHint()">💡 힌트 보기</button>
      <div class="hint-box" id="hint-box"></div>
    </div>

    <p class="question-label" id="question-label"></p>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">다음 문장 →</button>
  </div>

  <div class="result-screen" id="result-screen">
    <span class="result-icon" id="result-icon"></span>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-score" id="result-score"></div>
    <button class="restart-btn" onclick="restart()">다시 도전하기</button>
  </div>
</div>

<script>
const DATA = [
  {
    sentence: "오늘 날씨가 맑아서 기분이 좋다.",
    question: "밑줄 친 낱말의 뜻은?",
    underline: "맑아서",
    choices: ["구름이 없고 밝아서", "바람이 많이 불어서", "비가 조금 내려서", "안개가 껴서"],
    answer: 0,
    hint: "'맑다' = 하늘이 깨끗하고 밝다"
  },
  {
    sentence: "배가 고파서 밥을 빨리 먹었다.",
    question: "왜 밥을 빨리 먹었을까요?",
    underline: null,
    choices: ["늦잠을 자서", "배가 고파서", "친구가 기다려서", "수업이 시작해서"],
    answer: 1,
    hint: "'~어서/아서' = 이유나 원인을 나타냄"
  },
  {
    sentence: "친구가 먼저 인사를 해서 기뻤다.",
    question: "기쁜 이유가 무엇인가요?",
    underline: null,
    choices: ["선물을 받아서", "시험을 잘 봐서", "친구가 먼저 인사해서", "학교가 끝나서"],
    answer: 2,
    hint: "문장의 앞부분이 이유입니다"
  },
  {
    sentence: "비가 오면 운동장에서 놀 수 없다.",
    question: "이 문장에서 조건이 되는 말은?",
    underline: "비가 오면",
    choices: ["비가 오면", "운동장에서", "놀 수 없다", "없다"],
    answer: 0,
    hint: "'~(으)면' = 조건을 나타내는 말"
  },
  {
    sentence: "숙제를 다 하고 나서 게임을 했다.",
    question: "게임을 한 것은 언제인가요?",
    underline: null,
    choices: ["아침에 일어나서", "학교 가기 전에", "숙제를 다 한 후에", "저녁 먹기 전에"],
    answer: 2,
    hint: "'~고 나서' = 그 다음에"
  },
  {
    sentence: "나는 매일 아침 일찍 일어나려고 노력한다.",
    question: "밑줄 친 낱말의 뜻은?",
    underline: "노력한다",
    choices: ["그냥 한다", "열심히 애쓴다", "포기한다", "잊어버린다"],
    answer: 1,
    hint: "'노력하다' = 목표를 위해 힘쓰다"
  },
  {
    sentence: "창문을 열었더니 차가운 바람이 들어왔다.",
    question: "무엇이 일어났나요?",
    underline: null,
    choices: ["방이 따뜻해졌다", "차가운 바람이 들어왔다", "비가 내리기 시작했다", "창문이 닫혔다"],
    answer: 1,
    hint: "'~더니' = 앞의 행동 후에 생긴 결과"
  },
  {
    sentence: "그 영화는 무서워서 끝까지 보기 힘들었다.",
    question: "영화를 끝까지 보기 힘든 이유는?",
    underline: null,
    choices: ["너무 길어서", "너무 무서워서", "재미없어서", "자막이 없어서"],
    answer: 1,
    hint: "원인과 결과를 연결하는 문장"
  }
];

let current = 0, score = 0, answered = false;
const total = DATA.length;

function init() {
  const q = DATA[current];
  document.getElementById('stage-lbl').textContent = current + 1 + ' / ' + total;
  document.getElementById('prog').style.width = ((current / total) * 100) + '%';

  const st = document.getElementById('sentence-text');
  st.className = 'sentence-text';
  if (q.underline) {
    const parts = q.sentence.split(q.underline);
    st.innerHTML = parts[0] + '<span class="underline-word">' + q.underline + '</span>' + parts[1];
  } else {
    st.textContent = q.sentence;
  }

  document.getElementById('question-label').textContent = q.question;
  document.getElementById('hint-box').className = 'hint-box';
  document.getElementById('hint-box').textContent = q.hint;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';
  answered = false;

  const ch = document.getElementById('choices');
  ch.innerHTML = '';
  q.choices.forEach(function(c, i) {
    const b = document.createElement('button');
    b.className = 'choice-btn';
    b.textContent = c;
    b.onclick = function() { select(i); };
    ch.appendChild(b);
  });
}

function select(idx) {
  if (answered) return;
  answered = true;
  const q = DATA[current];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(function(b) { b.disabled = true; });
  btns[q.answer].classList.add('correct-ans');

  const fb = document.getElementById('feedback');
  const st = document.getElementById('sentence-text');

  if (idx === q.answer) {
    score++;
    document.getElementById('score-lbl').textContent = score + '점';
    fb.textContent = '정답이에요! 잘했어요.';
    fb.className = 'feedback correct';
    st.className = 'sentence-text correct';
    launchConfetti(1800);
  } else {
    btns[idx].classList.add('wrong-ans');
    fb.textContent = '아쉽지만 다시 살펴봐요.';
    fb.className = 'feedback wrong';
    st.className = 'sentence-text wrong';
  }
  document.getElementById('next-btn').style.display = 'block';
}

function toggleHint() {
  document.getElementById('hint-box').classList.toggle('show');
}

function speakSentence() {
  if (!('speechSynthesis' in window)) {
    alert('이 브라우저는 소리 듣기를 지원하지 않아요.');
    return;
  }
  const u = new SpeechSynthesisUtterance(DATA[current].sentence);
  u.lang = 'ko-KR';
  u.rate = 0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function nextQ() {
  current++;
  if (current >= total) { showResult(); return; }
  init();
}

function showResult() {
  document.getElementById('prog').style.width = '100%';
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const pct = Math.round((score / total) * 100);
  let icon, title, sub;
  if (pct === 100) {
    icon = '🌟'; title = '완벽해요!'; sub = '모든 문장을 맞혔어요. 정말 대단해요!';
  } else if (pct >= 75) {
    icon = '⭐'; title = '잘했어요!'; sub = '조금만 더 하면 만점이에요!';
  } else if (pct >= 50) {
    icon = '👍'; title = '잘 하고 있어요'; sub = '힌트를 활용하면 더 잘 할 수 있어요.';
  } else {
    icon = '💪'; title = '계속 도전해봐요'; sub = '소리 듣기와 힌트를 활용해 보세요.';
  }

  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('result-score').textContent = total + '문제 중 ' + score + '문제 정답';
  if (pct >= 75) launchConfetti(3500);
}

function restart() {
  current = 0; score = 0;
  document.getElementById('score-lbl').textContent = '0점';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-screen').style.display = 'block';
  init();
}

/* ── Confetti ── */
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [], animId = null;
const COLORS = ['#1D9E75','#5DCAA5','#378ADD','#EF9F27','#D85A30','#D4537E','#fac775'];

function launchConfetti(duration) {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  particles = [];
  for (let i = 0; i < 100; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -12,
      w: 7 + Math.random() * 8,
      h: 10 + Math.random() * 10,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      vx: (Math.random() - 0.5) * 5,
      vy: 3 + Math.random() * 4,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 7
    });
  }
  if (animId) cancelAnimationFrame(animId);
  const end = Date.now() + duration;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(function(p) {
      ctx.save();
      ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.rotV;
      p.vy += 0.09;
    });
    if (Date.now() < end) {
      animId = requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
  draw();
}

init();
</script>
</body>
</html>
