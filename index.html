<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문장 읽기 연습</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      background: #f4f6f8;
      min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 2rem 1rem 4rem;
    }
    #app { width: 100%; max-width: 600px; }

    /* Stage select */
    .stage-select-screen h1 { text-align:center; font-size:20px; font-weight:700; color:#1a1a2e; margin-bottom:6px; }
    .stage-select-screen .sub { text-align:center; font-size:14px; color:#888; margin-bottom:1.5rem; }
    .stage-cards { display:flex; flex-direction:column; gap:10px; }
    .stage-card {
      background:#fff; border:1.5px solid #e2e8f0; border-radius:14px;
      padding:1rem 1.25rem; cursor:pointer;
      display:flex; align-items:center; gap:14px;
      transition:all 0.18s; box-shadow:0 1px 4px rgba(0,0,0,0.04);
    }
    .stage-card:hover { border-color:#9FE1CB; background:#f0faf6; transform:translateY(-1px); }
    .stage-card.locked { opacity:0.45; cursor:not-allowed; }
    .stage-card.locked:hover { transform:none; background:#fff; border-color:#e2e8f0; }
    .stage-num {
      width:44px; height:44px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:18px; font-weight:700; flex-shrink:0;
    }
    .stage-info { flex:1; }
    .stage-info .s-title { font-size:15px; font-weight:600; color:#1a1a2e; margin-bottom:2px; }
    .stage-info .s-desc  { font-size:12px; color:#888; }
    .stage-badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:99px; }
    .badge-done   { background:#E1F5EE; color:#0F6E56; }
    .badge-locked { background:#f0f0f0; color:#aaa; }
    .badge-go     { background:#E6F1FB; color:#185FA5; }

    /* Quiz */
    #quiz-screen { display:none; }
    .back-btn {
      display:inline-flex; align-items:center; gap:6px;
      font-size:13px; color:#888; background:none; border:none;
      cursor:pointer; font-family:inherit; margin-bottom:1rem; padding:0;
    }
    .back-btn:hover { color:#1a1a2e; }
    .header-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
    .stage-title-sm { font-size:13px; font-weight:600; color:#1D9E75; }
    .top-bar { display:flex; align-items:center; gap:12px; margin-bottom:1.25rem; }
    .stage-label { font-size:13px; color:#888; min-width:40px; white-space:nowrap; }
    .progress-wrap { flex:1; height:8px; background:#e2e8f0; border-radius:99px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:99px; background:#1D9E75; transition:width 0.5s ease; }
    .score-badge { font-size:13px; font-weight:600; color:#1D9E75; min-width:36px; text-align:right; }

    .sentence-card {
      background:#fff; border:1.5px solid #e2e8f0; border-radius:16px;
      padding:1.75rem 1.5rem 1.5rem; text-align:center; margin-bottom:1rem;
      min-height:120px; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:14px;
      box-shadow:0 2px 8px rgba(0,0,0,0.05);
    }
    .sentence-text {
      font-size:19px; font-weight:600; color:#1a1a2e;
      line-height:1.8; letter-spacing:0.01em; transition:color 0.3s;
    }
    .sentence-text.correct { color:#0F6E56; }
    .sentence-text.wrong   { color:#A32D2D; }
    .underline-word { text-decoration:underline; text-underline-offset:5px; text-decoration-color:#378ADD; }

    .speak-btn {
      display:inline-flex; align-items:center; gap:6px;
      background:#f0faf6; border:1px solid #9FE1CB; border-radius:99px;
      padding:6px 16px; font-size:13px; color:#0F6E56;
      cursor:pointer; transition:background 0.2s; font-family:inherit;
    }
    .speak-btn:hover { background:#d4f0e5; }
    .speak-btn svg { width:14px; height:14px; fill:#0F6E56; flex-shrink:0; }

    .question-label { font-size:14px; color:#555; text-align:center; margin-bottom:0.75rem; }

    .hint-wrap { text-align:center; margin-bottom:0.75rem; }
    .hint-toggle {
      font-size:13px; color:#aaa; cursor:pointer;
      text-decoration:underline; text-underline-offset:3px;
      background:none; border:none; font-family:inherit;
    }
    .hint-toggle:hover { color:#777; }
    .hint-box {
      display:none; margin-top:8px; background:#fffbe6;
      border:1px solid #fac775; border-radius:8px;
      padding:8px 14px; font-size:13px; color:#633806; text-align:center;
    }
    .hint-box.show { display:block; }

    .choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:1rem; }
    .choice-btn {
      background:#fff; border:1.5px solid #e2e8f0; border-radius:12px;
      padding:14px 10px; font-size:14px; font-weight:500; color:#1a1a2e;
      cursor:pointer; transition:all 0.18s; text-align:center; line-height:1.4;
      font-family:inherit; box-shadow:0 1px 4px rgba(0,0,0,0.04);
    }
    .choice-btn:hover:not(:disabled) { background:#f0faf6; border-color:#9FE1CB; transform:translateY(-1px); }
    .choice-btn.correct-ans { background:#E1F5EE; border-color:#1D9E75; color:#085041; }
    .choice-btn.wrong-ans   { background:#FCEBEB; border-color:#E24B4A; color:#501313; }
    .choice-btn:disabled { cursor:default; transform:none; }

    .feedback {
      text-align:center; font-size:15px; font-weight:600;
      min-height:22px; margin-bottom:0.75rem; color:transparent; transition:color 0.2s;
    }
    .feedback.correct { color:#0F6E56; }
    .feedback.wrong   { color:#A32D2D; }

    .next-btn {
      display:none; width:100%; padding:14px; border-radius:12px;
      border:none; background:#1D9E75; color:#fff;
      font-size:16px; font-weight:600; cursor:pointer;
      transition:background 0.2s, transform 0.1s; font-family:inherit;
      box-shadow:0 3px 10px rgba(29,158,117,0.3);
    }
    .next-btn:hover  { background:#0F6E56; }
    .next-btn:active { transform:scale(0.98); }

    /* Result */
    #result-screen {
      display:none; text-align:center; padding:2.5rem 1rem;
      background:#fff; border-radius:20px; border:1.5px solid #e2e8f0;
      box-shadow:0 4px 16px rgba(0,0,0,0.07);
    }
    #result-screen.show { display:block; }
    .result-icon  { font-size:56px; margin-bottom:12px; display:block; }
    .result-title { font-size:24px; font-weight:700; color:#1a1a2e; margin-bottom:8px; }
    .result-sub   { font-size:15px; color:#666; margin-bottom:8px; }
    .result-score { font-size:32px; font-weight:700; color:#1D9E75; margin-bottom:1.5rem; }
    .result-btns  { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .restart-btn, .next-stage-btn {
      padding:12px 28px; border-radius:12px; font-size:15px; font-weight:600;
      cursor:pointer; font-family:inherit; transition:all 0.2s;
    }
    .restart-btn    { border:1.5px solid #e2e8f0; background:#fff; color:#1a1a2e; }
    .restart-btn:hover { background:#f4f6f8; }
    .next-stage-btn {
      border:none; background:#1D9E75; color:#fff;
      box-shadow:0 3px 10px rgba(29,158,117,0.3);
    }
    .next-stage-btn:hover { background:#0F6E56; }

    #confetti-canvas {
      position:fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:9999;
    }

    @media (max-width:400px) {
      .sentence-text { font-size:16px; }
      .choice-btn    { font-size:13px; padding:11px 7px; }
    }
  </style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="app">

  <div class="stage-select-screen" id="stage-select-screen">
    <h1>문장 읽기 연습</h1>
    <p class="sub">단계를 선택하세요</p>
    <div class="stage-cards" id="stage-cards"></div>
  </div>

  <div id="quiz-screen">
    <button class="back-btn" onclick="goBack()">← 단계 목록</button>
    <div class="header-row">
      <span class="stage-title-sm" id="stage-title-sm"></span>
    </div>
    <div class="top-bar">
      <span class="stage-label" id="stage-lbl">1 / 10</span>
      <div class="progress-wrap"><div class="progress-fill" id="prog" style="width:0%"></div></div>
      <span class="score-badge" id="score-lbl">0점</span>
    </div>
    <div class="sentence-card">
      <div class="sentence-text" id="sentence-text"></div>
      <button class="speak-btn" onclick="speakSentence()">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        소리 듣기
      </button>
    </div>
    <div class="hint-wrap">
      <button class="hint-toggle" onclick="toggleHint()">💡 힌트 보기</button>
      <div class="hint-box" id="hint-box"></div>
    </div>
    <p class="question-label" id="question-label"></p>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">다음 문장 →</button>
  </div>

  <div id="result-screen">
    <span class="result-icon"  id="result-icon"></span>
    <div class="result-title"  id="result-title"></div>
    <div class="result-sub"    id="result-sub"></div>
    <div class="result-score"  id="result-score"></div>
    <div class="result-btns">
      <button class="restart-btn"    onclick="restartStage()">다시 풀기</button>
      <button class="next-stage-btn" id="next-stage-btn" onclick="goNextStage()">다음 단계 →</button>
    </div>
  </div>

</div>
<script>
var STAGES = [
  {
    id:1, title:"1단계 — 일상생활", color:"#1D9E75", bg:"#E1F5EE", desc:"짧고 쉬운 일상 문장",
    questions:[
      {sentence:"오늘 날씨가 맑다.", question:"날씨가 어떤가요?", underline:"맑다", choices:["흐리다","맑다","춥다","덥다"], answer:1, hint:"'맑다'는 하늘이 깨끗하고 밝은 것"},
      {sentence:"나는 밥을 먹었다.", question:"무엇을 했나요?", underline:null, choices:["잠을 잤다","밥을 먹었다","책을 읽었다","놀았다"], answer:1, hint:"문장을 천천히 읽어 보세요"},
      {sentence:"고양이가 귀엽다.", question:"무엇이 귀엽나요?", underline:null, choices:["강아지","새","고양이","물고기"], answer:2, hint:"주어를 찾아보세요"},
      {sentence:"비가 와서 우산을 썼다.", question:"왜 우산을 썼나요?", underline:"비가 와서", choices:["바람이 불어서","비가 와서","날씨가 더워서","눈이 와서"], answer:1, hint:"'~어서'는 이유를 나타냄"},
      {sentence:"배가 고파서 과자를 먹었다.", question:"왜 과자를 먹었나요?", underline:null, choices:["심심해서","배가 고파서","친구가 줘서","맛있어 보여서"], answer:1, hint:"앞 문장이 이유예요"},
      {sentence:"나는 학교에 걸어서 갔다.", question:"어떻게 학교에 갔나요?", underline:"걸어서", choices:["버스로","자전거로","걸어서","뛰어서"], answer:2, hint:"밑줄 친 말에 집중해요"},
      {sentence:"동생이 울고 있다.", question:"동생이 지금 무엇을 하고 있나요?", underline:null, choices:["자고 있다","놀고 있다","울고 있다","먹고 있다"], answer:2, hint:"'-고 있다'는 지금 하는 중이라는 뜻"},
      {sentence:"창문을 열면 바람이 들어온다.", question:"바람이 들어오려면 어떻게 해야 하나요?", underline:"창문을 열면", choices:["문을 닫으면","창문을 열면","불을 켜면","음악을 틀면"], answer:1, hint:"'~(으)면'은 조건이에요"},
      {sentence:"오늘은 기분이 좋다.", question:"오늘 기분이 어떤가요?", underline:null, choices:["나쁘다","슬프다","좋다","무섭다"], answer:2, hint:"문장을 소리 내어 읽어 보세요"},
      {sentence:"숙제를 다 하고 나서 쉬었다.", question:"무엇을 먼저 했나요?", underline:null, choices:["쉬었다","숙제를 했다","밥을 먹었다","잠을 잤다"], answer:1, hint:"'~고 나서'는 그 다음에라는 뜻"}
    ]
  },
  {
    id:2, title:"2단계 — 사회·도덕 기초", color:"#378ADD", bg:"#E6F1FB", desc:"생활 속 규칙과 도덕 문장",
    questions:[
      {sentence:"횡단보도에서는 초록불일 때 건너야 한다.", question:"횡단보도를 건너야 할 때는?", underline:"초록불일 때", choices:["빨간불일 때","초록불일 때","불이 없을 때","아무 때나"], answer:1, hint:"신호등 색깔을 생각해 보세요"},
      {sentence:"쓰레기는 쓰레기통에 버려야 한다.", question:"쓰레기를 어디에 버려야 하나요?", underline:null, choices:["길에","강에","쓰레기통에","화단에"], answer:2, hint:"환경을 생각해요"},
      {sentence:"친구가 힘들어할 때 도와주면 우정이 깊어진다.", question:"우정이 깊어지는 방법은?", underline:null, choices:["경쟁에서 이기기","친구가 힘들 때 돕기","혼자 공부하기","선물 주기"], answer:1, hint:"원인과 결과를 찾아보세요"},
      {sentence:"도서관에서는 조용히 해야 한다.", question:"도서관에서 지켜야 할 규칙은?", underline:"조용히 해야 한다", choices:["크게 떠들기","조용히 하기","뛰어다니기","음식 먹기"], answer:1, hint:"공공장소 예절을 생각해요"},
      {sentence:"거짓말을 하면 신뢰를 잃게 된다.", question:"신뢰를 잃는 이유는?", underline:null, choices:["공부를 안 해서","약속을 지켜서","거짓말을 해서","늦게 일어나서"], answer:2, hint:"원인이 되는 말을 찾아보세요"},
      {sentence:"버스에서 노약자에게 자리를 양보하는 것은 배려이다.", question:"밑줄 친 낱말 '배려'의 뜻은?", underline:"배려", choices:["남을 무시하는 것","남을 생각하고 도와주는 것","자리를 빼앗는 것","크게 소리치는 것"], answer:1, hint:"'배려'는 다른 사람을 위해 마음 쓰는 것"},
      {sentence:"환경을 보호하려면 일회용품 사용을 줄여야 한다.", question:"환경을 보호하는 방법은?", underline:null, choices:["일회용품을 많이 쓴다","자동차를 많이 탄다","일회용품 사용을 줄인다","쓰레기를 아무 데나 버린다"], answer:2, hint:"'~려면'은 목적을 이루기 위한 방법"},
      {sentence:"규칙을 지키면 모두가 안전하게 생활할 수 있다.", question:"규칙을 지키면 어떤 일이 생기나요?", underline:null, choices:["불편해진다","모두가 안전해진다","혼자만 좋아진다","더 힘들어진다"], answer:1, hint:"원인과 결과를 찾아보세요"},
      {sentence:"다른 사람의 물건을 허락 없이 가져가면 안 된다.", question:"이 문장이 말하는 것은?", underline:null, choices:["물건을 사야 한다","남의 물건은 허락 없이 가져가면 안 된다","물건을 아껴야 한다","물건을 잘 찾아야 한다"], answer:1, hint:"핵심 내용을 찾아보세요"},
      {sentence:"실수를 했을 때 솔직하게 인정하는 것이 용기이다.", question:"'용기'가 필요한 상황은?", underline:"용기", choices:["시험을 잘 봤을 때","실수를 숨길 때","실수를 솔직하게 인정할 때","친구와 놀 때"], answer:2, hint:"'용기'는 어렵더라도 옳은 일을 하는 것"}
    ]
  },
  {
    id:3, title:"3단계 — 사회·시사", color:"#BA7517", bg:"#FAEEDA", desc:"사회 개념과 시사 문장",
    questions:[
      {sentence:"민주주의는 국민이 직접 또는 대표를 통해 나라를 다스리는 제도이다.", question:"민주주의에서 나라를 다스리는 주체는?", underline:"국민", choices:["왕","군인","국민","외국인"], answer:2, hint:"'주체'는 어떤 일을 하는 사람이나 집단"},
      {sentence:"세금은 국가가 공공서비스를 제공하기 위해 국민에게 걷는 돈이다.", question:"세금을 걷는 목적은?", underline:null, choices:["국왕의 생활비","개인 저축","공공서비스 제공","기업 이익"], answer:2, hint:"'목적'은 왜 하는지에 대한 이유"},
      {sentence:"인구가 줄어들면 일할 사람이 부족해져 경제가 어려워질 수 있다.", question:"인구 감소가 가져올 수 있는 문제는?", underline:null, choices:["일자리가 늘어난다","경제가 어려워질 수 있다","집값이 내려간다","환경이 좋아진다"], answer:1, hint:"원인(인구 감소) → 결과를 찾아요"},
      {sentence:"헌법은 나라의 기본 법으로, 모든 법률은 헌법을 따라야 한다.", question:"헌법에 대한 설명으로 맞는 것은?", underline:"헌법", choices:["가장 낮은 법이다","모든 법의 기본이 되는 법이다","학교에서만 쓰는 법이다","외국 법을 따른 것이다"], answer:1, hint:"'기본 법'이라는 말에 집중하세요"},

var STORAGE_KEY = 'reading_progress_v1';
var progress = loadProgress();
var currentStage = null;
var currentQ = 0;
var score = 0;
var answered = false;

function loadProgress() {
  try { var r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : {}; }
  catch(e) { return {}; }
}
function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch(e) {}
}

function renderStageSelect() {
  document.getElementById('stage-select-screen').style.display = 'block';
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').classList.remove('show');
  var container = document.getElementById('stage-cards');
  container.innerHTML = '';
  STAGES.forEach(function(s, i) {
    var done   = progress[s.id] !== undefined;
    var locked = i > 0 && !progress[STAGES[i-1].id];
    var card   = document.createElement('div');
    card.className = 'stage-card' + (locked ? ' locked' : '');
    var badge = done
      ? '<span class="stage-badge badge-done">완료 '+progress[s.id]+'/10</span>'
      : locked
        ? '<span class="stage-badge badge-locked">잠김</span>'
        : '<span class="stage-badge badge-go">도전!</span>';
    card.innerHTML =
      '<div class="stage-num" style="background:'+s.bg+';color:'+s.color+'">'+s.id+'</div>'+
      '<div class="stage-info"><div class="s-title">'+s.title+'</div><div class="s-desc">'+s.desc+'</div></div>'+
      badge;
    if (!locked) { card.onclick = function(){ startStage(s.id); }; }
    container.appendChild(card);
  });
}

function startStage(stageId) {
  currentStage = STAGES.filter(function(s){ return s.id===stageId; })[0];
  currentQ = 0; score = 0; answered = false;
  document.getElementById('stage-select-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('stage-title-sm').textContent = currentStage.title;
  document.getElementById('score-lbl').textContent = '0점';
  initQ();
}

function initQ() {
  var q = currentStage.questions[currentQ];
  var total = currentStage.questions.length;
  document.getElementById('stage-lbl').textContent = (currentQ+1)+' / '+total;
  document.getElementById('prog').style.width = ((currentQ/total)*100)+'%';
  var st = document.getElementById('sentence-text');
  st.className = 'sentence-text';
  if (q.underline) {
    var parts = q.sentence.split(q.underline);
    st.innerHTML = parts[0]+'<span class="underline-word">'+q.underline+'</span>'+(parts[1]||'');
  } else { st.textContent = q.sentence; }
  document.getElementById('question-label').textContent = q.question;
  document.getElementById('hint-box').className = 'hint-box';
  document.getElementById('hint-box').textContent = q.hint;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';
  answered = false;
  var ch = document.getElementById('choices');
  ch.innerHTML = '';
  q.choices.forEach(function(c, i) {
    var b = document.createElement('button');
    b.className = 'choice-btn'; b.textContent = c;
    b.onclick = function(){ select(i); };
    ch.appendChild(b);
  });
}

function select(idx) {
  if (answered) return;
  answered = true;
  var q = currentStage.questions[currentQ];
  var btns = document.querySelectorAll('.choice-btn');
  btns.forEach(function(b){ b.disabled = true; });
  btns[q.answer].classList.add('correct-ans');
  var fb = document.getElementById('feedback');
  var st = document.getElementById('sentence-text');
  if (idx === q.answer) {
    score++;
    document.getElementById('score-lbl').textContent = score+'점';
    fb.textContent = '정답이에요! 잘했어요.';
    fb.className = 'feedback correct';
    st.className = 'sentence-text correct';
    launchConfetti(1600);
  } else {
    btns[idx].classList.add('wrong-ans');
    fb.textContent = '아쉽지만 다시 살펴봐요.';
    fb.className = 'feedback wrong';
    st.className = 'sentence-text wrong';
  }
  document.getElementById('next-btn').style.display = 'block';
}

function toggleHint() { document.getElementById('hint-box').classList.toggle('show'); }

function speakSentence() {
  if (!('speechSynthesis' in window)) return;
  var u = new SpeechSynthesisUtterance(currentStage.questions[currentQ].sentence);
  u.lang = 'ko-KR'; u.rate = 0.85;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}

function nextQ() {
  currentQ++;
  if (currentQ >= currentStage.questions.length) { showResult(); return; }
  initQ();
}

function goBack() { renderStageSelect(); }

function showResult() {
  var total = currentStage.questions.length;
  document.getElementById('prog').style.width = '100%';
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').classList.add('show');
  progress[currentStage.id] = score;
  saveProgress();
  var pct = Math.round((score/total)*100);
  var icon, title, sub;
  if (pct===100)    { icon='🌟'; title='완벽해요!';       sub='모든 문제를 맞혔어요. 정말 대단해요!'; }
  else if (pct>=70) { icon='⭐'; title='잘했어요!';       sub='조금만 더 하면 만점이에요!'; }
  else if (pct>=50) { icon='👍'; title='잘 하고 있어요'; sub='힌트를 활용하면 더 잘 할 수 있어요.'; }
  else              { icon='💪'; title='계속 도전해봐요'; sub='소리 듣기와 힌트를 활용해 보세요.'; }
  document.getElementById('result-icon').textContent  = icon;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent   = sub;
  document.getElementById('result-score').textContent = total+'문제 중 '+score+'문제 정답';
  var nextBtn = document.getElementById('next-stage-btn');
  var nextIdx = STAGES.map(function(s){return s.id;}).indexOf(currentStage.id) + 1;
  if (nextIdx < STAGES.length) {
    nextBtn.style.display = 'inline-block';
    nextBtn.textContent = STAGES[nextIdx].id+'단계 도전 →';
  } else { nextBtn.style.display = 'none'; }
  if (pct >= 70) launchConfetti(3200);
}

function restartStage() { startStage(currentStage.id); }

function goNextStage() {
  var nextIdx = STAGES.map(function(s){return s.id;}).indexOf(currentStage.id) + 1;
  if (nextIdx < STAGES.length) startStage(STAGES[nextIdx].id);
}

/* Confetti */
var canvas = document.getElementById('confetti-canvas');
var ctx = canvas.getContext('2d');
var particles = [], animId = null;
var COLORS = ['#1D9E75','#5DCAA5','#378ADD','#EF9F27','#D85A30','#D4537E','#fac775','#AFA9EC'];

function launchConfetti(duration) {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  particles = [];
  for (var i=0;i<100;i++) {
    particles.push({
      x:Math.random()*canvas.width, y:-12,
      w:7+Math.random()*8, h:10+Math.random()*10,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      vx:(Math.random()-0.5)*5, vy:3+Math.random()*4,
      rot:Math.random()*360, rotV:(Math.random()-0.5)*7
    });
  }
  if (animId) cancelAnimationFrame(animId);
  var end = Date.now()+duration;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(function(p){
      ctx.save();
      ctx.translate(p.x+p.w/2,p.y+p.h/2);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV; p.vy+=0.09;
    });
    if (Date.now()<end) animId=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

renderStageSelect();
</script>
